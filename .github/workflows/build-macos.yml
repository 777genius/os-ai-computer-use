name: Build macOS

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
    outputs:
      artifact-name:
        description: 'Name of the artifact'
        value: ${{ jobs.build.outputs.artifact-name }}
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

jobs:
  build:
    runs-on: macos-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    env:
      APPLE_SIGNING_IDENTITY: 'Developer ID Application: Oleksii Zelenko (6C84CW694S)'
      APP_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No certificate provided, skipping import"
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)

          echo "Certificate imported successfully"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Flutter dependencies
        working-directory: frontend_flutter
        run: flutter pub get

      - name: Generate tray icons
        run: python packaging/create_tray_icons.py

      - name: Build Flutter macOS app
        working-directory: frontend_flutter
        run: flutter build macos --release

      - name: Create VERSION file
        env:
          BUILD_VERSION: ${{ inputs.version }}
        run: echo "$BUILD_VERSION" > VERSION

      - name: Package with PyInstaller
        run: |
          python -m PyInstaller packaging/launcher-macos.spec --clean
          ls -la dist/

      - name: Embed Flutter app into bundle
        run: |
          FLUTTER_SRC="frontend_flutter/build/macos/Build/Products/Release/OS AI.app"
          BUNDLE_RESOURCES="dist/OS AI.app/Contents/Resources/flutter_app"

          echo "Copying Flutter .app into bundle Resources..."
          mkdir -p "$BUNDLE_RESOURCES"
          cp -R "$FLUTTER_SRC" "$BUNDLE_RESOURCES/OS AI.app"

          echo "Verifying embedded Flutter app structure:"
          ls -la "$BUNDLE_RESOURCES/OS AI.app/Contents/MacOS/"

      - name: Deep sign the app bundle
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No certificate, skipping signing"
            exit 0
          fi

          APP_PATH="dist/OS AI.app"
          IDENTITY="${APPLE_SIGNING_IDENTITY}"
          ENTITLEMENTS="packaging/entitlements.plist"

          echo "=== Step 1: Sign individual .dylib and .so files ==="
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" \) | while read -r lib; do
            echo "  Signing: $lib"
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$lib" 2>&1 || true
          done

          echo "=== Step 2: Sign all Mach-O executables ==="
          find "$APP_PATH" -type f -perm +111 | while read -r bin; do
            file_type=$(file -b "$bin")
            if echo "$file_type" | grep -q "Mach-O"; then
              echo "  Signing: $bin"
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$bin" 2>&1 || true
            fi
          done

          echo "=== Step 3: Sign .framework bundles (deepest first) ==="
          find "$APP_PATH" -type d -name "*.framework" -print0 | \
            xargs -0 -I{} bash -c 'echo "$(echo "{}" | tr -cd "/" | wc -c) {}"' | \
            sort -rn | cut -d' ' -f2- | while read -r fw; do
            echo "  Signing framework: $fw"
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$fw" 2>&1 || true
          done

          echo "=== Step 4: Sign nested .app bundles (deepest first) ==="
          find "$APP_PATH" -type d -name "*.app" ! -path "$APP_PATH" -print0 | \
            xargs -0 -I{} bash -c 'echo "$(echo "{}" | tr -cd "/" | wc -c) {}"' | \
            sort -rn | cut -d' ' -f2- | while read -r nested_app; do
            echo "  Signing nested app: $nested_app"
            codesign --force --options runtime --timestamp \
              --entitlements "$ENTITLEMENTS" \
              --sign "$IDENTITY" "$nested_app" 2>&1 || true
          done

          echo "=== Step 5: Final sign of the top-level bundle (no --deep) ==="
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" "$APP_PATH"

          echo "=== Verifying signature ==="
          # --deep --strict не работает с вложенным Flutter .app в PyInstaller бандле
          # (bundle format is ambiguous). Проверяем только top-level — Apple notarytool
          # сделает полную валидацию при нотаризации.
          codesign --verify --verbose=2 "$APP_PATH" --no-strict || true
          spctl --assess --type execute --verbose=2 "$APP_PATH" 2>&1 || true
          echo "Signature applied, full validation will be done by notarytool"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "OS AI" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            --icon "OS AI.app" 200 185 \
            "dist/OS_AI_${APP_VERSION}_macOS.dmg" \
            "dist/OS AI.app" || true

      - name: Create ZIP archive
        working-directory: dist
        run: |
          ditto -c -k --keepParent "OS AI.app" "OS_AI_${APP_VERSION}_macOS.zip"
          ls -lh *.zip

      - name: Notarize app
        continue-on-error: true
        env:
          APPLE_ID_VAL: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_VAL: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_VAL: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID_VAL" ] || [ -z "$APPLE_PASSWORD_VAL" ] || [ -z "$APPLE_TEAM_ID_VAL" ]; then
            echo "Notarization secrets not set, skipping"
            exit 0
          fi

          ZIP_PATH="dist/OS_AI_${APP_VERSION}_macOS.zip"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID_VAL" \
            --password "$APPLE_PASSWORD_VAL" \
            --team-id "$APPLE_TEAM_ID_VAL" \
            --wait --timeout 30m

          echo "Stapling notarization ticket to app..."
          xcrun stapler staple "dist/OS AI.app"

          # Пересоздаём архивы после staple
          echo "Recreating archives with stapled ticket..."
          cd dist
          rm -f "OS_AI_${APP_VERSION}_macOS.zip"
          ditto -c -k --keepParent "OS AI.app" "OS_AI_${APP_VERSION}_macOS.zip"

          # Пересоздаём DMG если есть
          DMG_FILE="OS_AI_${APP_VERSION}_macOS.dmg"
          if [ -f "$DMG_FILE" ]; then
            rm -f "$DMG_FILE"
            cd ..
            create-dmg \
              --volname "OS AI" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --app-drop-link 600 185 \
              --icon "OS AI.app" 200 185 \
              "dist/$DMG_FILE" \
              "dist/OS AI.app" || true

            # Staple DMG
            xcrun stapler staple "dist/$DMG_FILE" || true
          fi

          echo "Notarization complete"

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: os-ai-macos-${{ inputs.version }}
          path: |
            dist/OS_AI_*.zip
            dist/OS_AI_*.dmg
          retention-days: 7
